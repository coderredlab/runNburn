name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  cpu-and-vulkan:
    name: CPU test and experimental Vulkan build
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cpu-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cpu-

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check CPU product path
        run: cargo check --locked -p rnb-cli --no-default-features --features cpu

      - name: Test CPU product path
        run: cargo test --locked -p rnb-cli --no-default-features --features cpu

      - name: Check experimental desktop Vulkan path
        run: cargo check --locked -p rnb-cli --no-default-features --features cpu,vulkan

      - name: Build CPU release binary
        run: cargo build --locked --release -p rnb-cli --no-default-features --features cpu
